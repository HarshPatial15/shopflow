apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HarshPatial15/shopflow.git
    targetRevision: main
    path: helm/api-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: shopflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
