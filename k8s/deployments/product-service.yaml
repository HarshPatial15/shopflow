apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopflow
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: harsh1505/product-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: shopflow-config
            - secretRef:
                name: shopflow-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shopflow
spec:
  selector:
    app: product-service
  ports:
    - port: 3002
      targetPort: 3002
